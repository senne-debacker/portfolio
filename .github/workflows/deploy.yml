name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portfolio/package-lock.json # Tell cache where lockfile is

      - name: Install dependencies
        run: npm ci
        working-directory: portfolio # Run install inside subfolder

      - name: Build site
        run: npm run build
        working-directory: portfolio # Run build inside subfolder

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio/dist # Upload from the correct built dist folder

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4